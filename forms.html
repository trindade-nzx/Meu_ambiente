
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1> Formulário de reconhecimenro de vacilo </h1>
    <form action="https://formsubmit.co/trindadegabrielc@gmail.com" method="POST">
        <table>
            <tr>
                <th><label for="nome">Nome:</label></th>
                <td><input type="text" id="nome" placeholder="seu nome" required></td>
            </tr>
            <tr>
                <th><label for="email">Email:</label></th>
                <td><input type="email" id="email" placeholder=" seu email" required></td>
            </tr>
            <tr>
                <th><label for="telefone">Telefone:</label></th>
                <td><input type="tel" id="telefone" placeholder="seu telefone" required></td>
            </tr>
            <tr>
                <th><label for="mensagem">Mensagem:</label></th>
                <td><textarea id="mensagem" rows=" 5" cols="30" placeholder="sua mensagem" required></textarea></td>
            </tr>
            <tr>
                <th><label for="me-ama">Me ama?</label></th>
                <td><input type="radio" id="me-ama" name="me-ama" value="sim"> Sim</td>
                <td><input type="radio" id="me-ama" name="me-ama" value="nao"> Não</td>
            </tr>
        </table>
        <button type="submit">Enviar</button>
    </form>

</body>
</html>
